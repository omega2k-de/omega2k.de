networks:
  o2k:
    enable_ipv6: true
    ipam:
      driver: default

volumes:
  likes:
  browser:

services:
  webservice-ssr:
    hostname: 'webservice-ssr'
    container_name: 'webservice-www-${COMPOSE_IMAGE_TAG:-latest}'
    restart: always
    build:
      context: ../../..
      dockerfile: ./docker/Dockerfile.ssr
      args:
        RELEASE_VERSION: '${RELEASE_VERSION:-0.0.0-dev}'
        VCS_REF: '${CI_COMMIT_SHA:-local}'
    image: '${REGISTRY:-registry.omega2k.de}/www/ssr:${COMPOSE_IMAGE_TAG:-latest}'
    volumes:
      - browser:/app/browser
    ports:
      - '${COMPOSE_PORT_SSR:-31000}:80'
    depends_on:
      webservice-api:
        condition: service_started
    environment:
      API_INTERNAL_URL: '${API_INTERNAL_URL:-https://api.omega2k.de}'
    networks: [o2k]

  webservice-api:
    hostname: 'webservice-api'
    container_name: 'webservice-api-${COMPOSE_IMAGE_TAG:-latest}'
    restart: always
    build:
      context: ../../..
      dockerfile: ./docker/Dockerfile.api
      args:
        RELEASE_VERSION: '${RELEASE_VERSION:-0.0.0-dev}'
        VCS_REF: '${CI_COMMIT_SHA:-local}'
    image: '${REGISTRY:-registry.omega2k.de}/www/api:${COMPOSE_IMAGE_TAG:-latest}'
    volumes:
      - likes:/app/likes
    ports:
      - '${COMPOSE_PORT_API:-31003}:80'
    environment:
      LIKES_DB_PATH: /app/likes/likes.db
    networks: [o2k]
